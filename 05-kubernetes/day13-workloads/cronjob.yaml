apiVersion: batch/v1
kind: CronJob
metadata:
  name: hello
spec:
  schedule: "*/1 * * * *"     # every 1 minute (cron syntax — Day 1 callback!)
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: hello
            image: busybox
            command: ["sh", "-c", "echo Hello from CronJob at $(date)"]
          restartPolicy: OnFailure
