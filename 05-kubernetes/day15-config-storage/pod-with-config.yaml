apiVersion: v1
kind: Pod
metadata:
  name: configured-app
spec:
  containers:
  - name: app
    image: busybox
    command: ["sh", "-c", "echo '--- ENV VARS ---'; env | grep -E 'LOG_LEVEL|APP_MODE|DB_PASSWORD|API_KEY'; sleep 3600"]
    envFrom:
    - configMapRef:
        name: app-config      # inject ALL keys from the ConfigMap as env vars
    - secretRef:
        name: app-secret      # inject ALL keys from the Secret as env vars
